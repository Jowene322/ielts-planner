<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>雅思7分冲刺计划 - IELTS Planner</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192x192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192x192.png">
  <link rel="apple-touch-icon-precomposed" sizes="192x192" href="./icon-192x192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
    .subject-listening { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .subject-reading { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .subject-writing { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .subject-speaking { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .subject-vocabulary { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .subject-mock { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
    .subject-review { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
    .task-card { transition: all 0.2s ease; }
    .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .completed-task { opacity: 0.7; }
    .completed-task .task-title { text-decoration: line-through; }
    .calendar-day { aspect-ratio: 1; }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
    .confetti {
      position: fixed; width: 10px; height: 10px; background: #f00;
      animation: fall 3s linear forwards; z-index: 9999;
    }
    @keyframes fall {
      to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div id="app" class="max-w-4xl mx-auto pb-24">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
      <div class="px-4 py-4 flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-900">雅思7分冲刺计划</h1>
          <p class="text-xs text-gray-500 mt-0.5">目标：8月28日 · 总分7.0 · v2.0</p>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-right">
            <div class="text-xs text-gray-500">距考试</div>
            <div class="text-lg font-bold text-indigo-600" id="days-left">--</div>
          </div>
          <div class="text-right">
            <div class="text-xs text-gray-500">积分</div>
            <div class="text-lg font-bold text-amber-500" id="total-points">0</div>
          </div>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="flex border-b border-gray-200">
        <button onclick="app.navigate('today')" id="nav-today" class="flex-1 py-3 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600">今日任务</button>
        <button onclick="app.navigate('calendar')" id="nav-calendar" class="flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent">日历打卡</button>
        <button onclick="app.navigate('dashboard')" id="nav-dashboard" class="flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent">学习数据</button>
        <button onclick="app.navigate('plan')" id="nav-plan" class="flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent">计划概览</button>
      </nav>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="px-4 py-6">
      <!-- Views will be rendered here -->
    </main>
  </div>

  <script>
    // ===================== Configuration =====================
    const CONFIG = {
      startDate: '2026-07-10',
      examDate: '2026-08-28',
      dailyMinutes: 300,
      weekendMinutes: 360,
      subjects: {
        listening: { name: '听力', color: 'subject-listening', icon: '🎧' },
        reading: { name: '阅读', color: 'subject-reading', icon: '📖' },
        writing: { name: '写作', color: 'subject-writing', icon: '✍️' },
        speaking: { name: '口语', color: 'subject-speaking', icon: '🗣️' },
        vocabulary: { name: '词汇', color: 'subject-vocabulary', icon: '📝' },
        mock: { name: '模考', color: 'subject-mock', icon: '⏰' },
        review: { name: '复习', color: 'subject-review', icon: '🔄' },
        gym: { name: '健身', color: 'subject-review', icon: '💪' }
      },
      slots: [
        { time: '08:00', label: '早读热身', end: '08:30' },
        { time: '08:30', label: '听力深度学习', end: '10:30' },
        { time: '10:45', label: '阅读深度学习', end: '13:00' },
        { time: '14:00', label: '输出训练', end: '15:30' },
        { time: '15:45', label: '口语/词汇', end: '16:45' },
        { time: '17:00', label: '语料库/订正', end: '18:30' }
      ]
    };

    // ===================== Date Utilities =====================
    const DateUtil = {
      parse(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d);
      },
      format(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      },
      addDays(date, days) {
        const result = new Date(date);
        result.setDate(result.getDate() + days);
        return result;
      },
      daysBetween(a, b) {
        const da = typeof a === 'string' ? this.parse(a) : a;
        const db = typeof b === 'string' ? this.parse(b) : b;
        return Math.floor((db - da) / (1000 * 60 * 60 * 24));
      },
      isWeekend(dateStr) {
        const day = this.parse(dateStr).getDay();
        return day === 0 || day === 6;
      },
      today() {
        const now = new Date();
        return this.format(now);
      }
    };

    // ===================== Plan Generator =====================
    const PlanGenerator = {
      generate() {
        const start = DateUtil.parse(CONFIG.startDate);
        const exam = DateUtil.parse(CONFIG.examDate);
        const tasks = [];
        let dayIndex = 0;

        for (let d = new Date(start); d <= exam; d = DateUtil.addDays(d, 1)) {
          const dateStr = DateUtil.format(d);
          const week = Math.floor(dayIndex / 7) + 1;
          const dayOfWeek = d.getDay(); // 0=Sun, 6=Sat
          const isExamDay = dateStr === CONFIG.examDate;

          if (isExamDay) {
            tasks.push(this.createTask(dateStr, 'all', 'mock', '08:00', 30, '🎯 雅思考试日', '保持自信，发挥出最佳水平！记得带身份证/护照、准考证、铅笔、橡皮。'));
          } else {
            const dayTasks = this.getDayTasks(week, dayOfWeek, dayIndex, dateStr);
            tasks.push(...dayTasks);
          }
          dayIndex++;
        }
        return tasks;
      },

      createTask(date, slotTime, subject, time, duration, title, description = '') {
        return {
          id: `${date}-${slotTime}-${subject}-${time.replace(/:/g, '')}`,
          date,
          time,
          duration,
          subject,
          title,
          description,
          completed: false
        };
      },

      getDayTasks(week, dayOfWeek, dayIndex, dateStr) {
        const date = DateUtil.parse(dateStr);
        const start = DateUtil.parse(CONFIG.startDate);
        const courseEnd = DateUtil.addDays(start, 3); // 2026-07-13
        const sprintStart = DateUtil.parse('2026-08-25');
        const sprintEnd = DateUtil.parse('2026-08-27');

        if (date <= courseEnd) {
          return this.getCourseDayTasks(dateStr, date);
        }
        if (date >= sprintStart && date <= sprintEnd) {
          return this.getSprintDayTasks(dateStr, date);
        }
        return this.getPracticeDayTasks(dateStr, dayOfWeek, dayIndex);
      },

      getCourseDayTasks(dateStr, date) {
        const tasks = [];
        const d = date.getDate();
        const m = date.getMonth() + 1;

        if (m === 7 && d === 10) {
          tasks.push(this.createTask(dateStr, 'morning', 'vocabulary', '08:00', 30, '词汇入门：538考点词+场景词', '快速浏览听力场景词和阅读538考点词，建立基础词库。'));
          tasks.push(this.createTask(dateStr, 'peakA', 'listening', '08:30', 120, '何琼听力技巧课1-4', '系统学习雅思听力题型技巧、审题方法和同替识别。'));
          tasks.push(this.createTask(dateStr, 'peakB', 'writing', '10:45', 135, 'Simon写作Task 2结构课', '学习四段式结构：开头段+主体两段+结尾段；整理观点类/讨论类框架。'));
          tasks.push(this.createTask(dateStr, 'output', 'writing', '14:00', 90, 'Simon Task 2结构实践', '根据课程整理个人写作框架，列出常用连接词和句式。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '15:45', 60, '口语当季题库浏览', '浏览本季Part1/2/3题库，标记熟悉和不熟悉的话题。'));
          tasks.push(this.createTask(dateStr, 'evening', 'review', '17:00', 90, '今日课程笔记整理', '整理听力技巧笔记和写作结构模板，方便后续复习。'));
        } else if (m === 7 && d === 11) {
          tasks.push(this.createTask(dateStr, 'morning', 'vocabulary', '08:00', 30, '昨日错题词复习', '复习昨日课程中遇到的生词、同替和场景词。'));
          tasks.push(this.createTask(dateStr, 'peakA', 'listening', '08:30', 120, '何琼听力技巧课5-6', '继续学习听力技巧，重点突破填空题和选择题陷阱。'));
          tasks.push(this.createTask(dateStr, 'peakB', 'reading', '10:45', 135, '刘洪波平行阅读法', '学习“平行阅读法”：一次性处理多题型，提高阅读速度和定位准确度。'));
          tasks.push(this.createTask(dateStr, 'output', 'vocabulary', '14:00', 90, '顾家北词伙积累', '整理写作和口语高频词伙，建立个人词伙库。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '15:45', 60, '口语话题规划', '用“五点法”为Part 2话题搭建个人素材框架，避免死记硬背。'));
          tasks.push(this.createTask(dateStr, 'evening', 'review', '17:00', 90, '同义替换整理', '整理听力和阅读中常见同替，建立个人同替本。'));
        } else if (m === 7 && d === 12) {
          tasks.push(this.createTask(dateStr, 'morning', 'vocabulary', '08:00', 30, '刘洪波538关键词早读', '朗读记忆538阅读考点词，强化同替敏感度。'));
          tasks.push(this.createTask(dateStr, 'peakA', 'listening', '08:30', 120, '何琼听力技巧课7-8', '完成听力技巧课，重点攻克地图题和匹配题。'));
          tasks.push(this.createTask(dateStr, 'peakB', 'writing', '10:45', 135, 'Simon Task 1图表课', '学习线图/柱状图/饼图/表格/流程图描述方法，整理常用句型。'));
          tasks.push(this.createTask(dateStr, 'output', 'vocabulary', '14:00', 90, '538关键词深度记忆', '结合例句记忆538考点词，理解其在真题中的同替用法。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '15:45', 60, '口语Part 1练习', '用个人素材回答，避免死记硬背。Part1 3个话题 + Part2 1个卡片，录音回听'));
          tasks.push(this.createTask(dateStr, 'evening', 'review', '17:00', 90, '技巧课复习', '复习何琼听力和Simon写作要点，整理易错点清单。'));
        } else if (m === 7 && d === 13) {
          tasks.push(this.createTask(dateStr, 'morning', 'review', '08:00', 30, '复习所有课程笔记', '快速过一遍7.10-7.12所有课程笔记和技巧要点。'));
          tasks.push(this.createTask(dateStr, 'peakA', 'review', '08:30', 120, '全部课程技巧复盘', '系统复盘听力、阅读、写作方法论，形成个人解题checklist。'));
          tasks.push(this.createTask(dateStr, 'peakB', 'reading', '10:45', 135, '剑桥7 Test 1阅读练习（不限时）', '用刚学的平行阅读法不限时完成一套阅读，重点理解定位与同替逻辑。'));
          tasks.push(this.createTask(dateStr, 'output', 'writing', '14:00', 90, '杜仕明/顾家北写作逻辑', '学习Task 2论证逻辑（ABC法），整理观点展开方式。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '15:45', 60, '口语Part 2万能素材搭建', '准备3-5个万能故事素材，覆盖人物/地点/事件/物品类话题。'));
          tasks.push(this.createTask(dateStr, 'evening', 'review', '17:00', 90, '错题和笔记整理', '整理阅读练习中的错题，完善个人词库和同替本。'));
        }
        return tasks;
      },

      getSprintDayTasks(dateStr, date) {
        const tasks = [];
        const d = date.getDate();

        if (d === 25) {
          tasks.push(this.createTask(dateStr, 'morning', 'speaking', '08:00', 30, '口语热身', '简单话题开口说，保持流利度，不做难题。'));
          tasks.push(this.createTask(dateStr, 'mock', 'mock', '08:30', 180, '剑桥18 Test 3全科模考（3小时）', '严格按考试时间：8:30-9:10听力（+10分钟誊写），9:20-10:20阅读，10:30-11:30写作。模拟真实考试节奏。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'listening', '14:00', 90, '模考听力错题复盘', '重听错题Section，写出原文和题干中的同义替换词，分析错因。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'reading', '15:45', 60, '模考阅读错题精读', '分析错题原因：定位错误？同替没识别？还是理解偏差？精读答案句。'));
          tasks.push(this.createTask(dateStr, 'evening', 'speaking', '17:00', 90, '口语热身+录音', '用个人素材回答，避免死记硬背。Part1 3个话题 + Part2 1个卡片，录音回听'));
        } else if (d === 26) {
          tasks.push(this.createTask(dateStr, 'morning', 'speaking', '08:00', 30, '口语当季话题快速过', '快速过3个Part 1话题和1个Part 2卡片，保持反应速度。'));
          tasks.push(this.createTask(dateStr, 'peakA', 'listening', '08:30', 120, '听力错题回顾', '重听之前标记的难题，强化场景词和同替，不再做新题。'));
          tasks.push(this.createTask(dateStr, 'peakB', 'reading', '10:45', 135, '阅读错题回顾', '复习538考点词和错题，保持定位敏感度，不做新长篇。'));
          tasks.push(this.createTask(dateStr, 'output', 'writing', '14:00', 90, '写作模板默写', '默写个人专属开头、结尾、过渡句和高频词伙，确保考试不卡壳。'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '15:45', 60, '口语话题快速过', '用个人素材回答，避免死记硬背。Part1 3个话题 + Part2 1个卡片，录音回听'));
          tasks.push(this.createTask(dateStr, 'evening', 'review', '17:00', 90, '考试物品/证件准备', '身份证、准考证、2B铅笔、橡皮、耳机电池（如适用）。确认交通和考点。'));
        } else if (d === 27) {
          tasks.push(this.createTask(dateStr, 'morning', 'speaking', '08:00', 30, '口语热身', '简单话题保持流利度，不做难题。'));
          tasks.push(this.createTask(dateStr, 'peakA', 'writing', '08:30', 120, '写作模板回顾', '快速回顾Task 1/2模板和常用词伙，强化肌肉记忆。'));
          tasks.push(this.createTask(dateStr, 'peakB', 'review', '10:45', 135, '轻量复习：错词+同替', '看看之前整理的高频词伙和同替，不做新题。'));
          tasks.push(this.createTask(dateStr, 'output', 'speaking', '14:00', 90, '口语热身+录音', '用个人素材回答，避免死记硬背。Part1 3个话题 + Part2 1个卡片，录音回听'));
          tasks.push(this.createTask(dateStr, 'afternoon', 'review', '15:45', 60, '轻松复习+整理心态', '听听英文播客或看看整理的高频词伙，保持放松。'));
          tasks.push(this.createTask(dateStr, 'evening', 'vocabulary', '17:00', 90, '早睡准备', '21:30前上床，保证8小时睡眠，调整生物钟。'));
        }
        return tasks;
      },

      getPracticeDayTasks(dateStr, dayOfWeek, dayIndex) {
        const tasks = [];
        const practiceDayIndex = DateUtil.daysBetween('2026-07-14', dateStr);
        const isGymDay = practiceDayIndex % 2 === 0;
        const listeningBook = this.getCambridgeBook(practiceDayIndex);
        const listeningTest = this.getCambridgeTest(practiceDayIndex);
        const readingBook = this.getCambridgeBook(practiceDayIndex + 24);
        const readingTest = this.getCambridgeTest(practiceDayIndex + 24);
        const speakingTopic = this.getSpeakingTopic(practiceDayIndex);
        const isBigEssay = practiceDayIndex % 2 === 0;

        // 08:00-08:30 早读热身
        tasks.push(this.createTask(dateStr, 'morning', 'speaking', '08:00', 30, '口语朗读+昨日错词复习', '跟读口语素材5分钟，复习昨日听力和阅读错题词。'));

        // 08:30-10:30 听力深度学习
        tasks.push(this.createTask(dateStr, 'peakA', 'listening', '08:30', 120, `${listeningBook} ${listeningTest} 听力完整套题`, '限时30分钟做题；60分钟精听错题Section；整理同义替换+背诵；答案句翻译理解读10遍'));

        // 10:45-13:00 阅读深度学习
        tasks.push(this.createTask(dateStr, 'peakB', 'reading', '10:45', 135, `${readingBook} ${readingTest} 阅读完整套题`, '限时60分钟做题；45分钟改正+精读答案句；30分钟整理同义替换+背诵'));

        // 14:00-15:30 输出训练（写作）
        if (isGymDay) {
          const title = isBigEssay ? '写作大作文（限时45分钟）' : '写作小作文（限时20分钟）';
          const desc = isBigEssay
            ? '45分钟完成Task 2；对照Simon/顾家北范文整理素材；背5个好词好句好搭配'
            : '20分钟完成Task 1；对照范文整理图表描述素材；背5个好词好句';
          tasks.push(this.createTask(dateStr, 'output', 'writing', '14:00', 45, title, desc));
        } else {
          const title = isBigEssay ? '写作大作文+范文分析' : '写作小作文+范文分析';
          const desc = isBigEssay
            ? '40分钟完成Task 2；对照Simon/顾家北范文整理素材；背5个好词好句好搭配'
            : '20分钟完成Task 1；对照范文整理图表描述素材；背5个好词好句';
          tasks.push(this.createTask(dateStr, 'output', 'writing', '14:00', 90, title, desc));
        }

        if (isGymDay) {
          // 15:45-17:45 健身
          tasks.push(this.createTask(dateStr, 'gym', 'gym', '15:45', 120, '健身', '运动放松，保持良好身体状态。'));
          // 18:00-19:00 口语
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '18:00', 60, `口语素材练习：${speakingTopic}`, '用个人素材回答，避免死记硬背。Part1 3个话题 + Part2 1个卡片，录音回听'));
          // 19:15-20:00 语料库（45分钟）
          tasks.push(this.createTask(dateStr, 'evening', 'vocabulary', '19:15', 45, '王陆语料库听写+订正', '王陆语料库第3/4/5/11章重点；30分钟听写+15分钟订正'));
        } else {
          // 15:45-16:45 口语
          tasks.push(this.createTask(dateStr, 'afternoon', 'speaking', '15:45', 60, `口语素材练习：${speakingTopic}`, '用个人素材回答，避免死记硬背。Part1 3个话题 + Part2 1个卡片，录音回听'));

          tasks.push(this.createTask(dateStr, 'evening', 'vocabulary', '17:00', 90, '王陆语料库听写+订正', '王陆语料库第3/4/5/11章重点；60分钟听写+30分钟订正'));
        }

      },

      getCambridgeBook(dayOffset) {
        const books = [];
        for (let i = 7; i <= 18; i++) {
          for (let j = 0; j < 4; j++) {
            books.push(`剑${i}`);
          }
        }
        return books[dayOffset % 48];
      },

      getCambridgeTest(dayOffset) {
        return ['Test 1', 'Test 2', 'Test 3', 'Test 4'][dayOffset % 4];
      },

      getSpeakingTopic(dayOffset) {
        const topics = ['人物类', '地点类', '事件类', '物品类', '活动类', '经历类', '未来计划'];
        return topics[dayOffset % 7];

    };

    // ===================== Storage Manager =====================
    const Storage = {
      KEY: 'ielts_planner_state_v1',

      load() {
        try {
          const raw = localStorage.getItem(this.KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {
          console.error('Load failed:', e);
        }
        return null;
      },

      save(state) {
        try {
          localStorage.setItem(this.KEY, JSON.stringify(state));
        } catch (e) {
          console.error('Save failed:', e);
        }
      },

      clear() {
        localStorage.removeItem(this.KEY);
      }
    };

    // ===================== State Manager =====================
    const State = {
      data: null,

      init() {
        const saved = Storage.load();
        if (saved && saved.tasks && saved.tasks.length > 0) {
          this.data = saved;
          this.ensureScheduleIntegrity();
        } else {
          this.data = this.createInitialState();
          this.save();
        }
      },

      createInitialState() {
        const tasks = PlanGenerator.generate();
        return {
          tasks,
          checkIns: {},
          streak: { current: 0, longest: 0 },
          totalPoints: 0,
          lastVisit: DateUtil.today(),
          version: 1
        };
      },

      save() {
        Storage.save(this.data);
      },

      reset() {
        this.data = this.createInitialState();
        this.save();
      },

      getTasksByDate(date) {
        return this.data.tasks.filter(t => t.date === date).sort((a, b) => a.time.localeCompare(b.time));
      },

      getTask(id) {
        return this.data.tasks.find(t => t.id === id);
      },

      toggleTask(id) {
        const task = this.getTask(id);
        if (task) {
          task.completed = !task.completed;
          this.save();
        }
        return task;
      },

      getCheckIn(date) {
        return this.data.checkIns[date] || { checkedIn: false, pointsEarned: 0, allCompleted: false };
      },

      checkIn(date) {
        const tasks = this.getTasksByDate(date);
        if (tasks.length === 0) return null;

        const allCompleted = tasks.every(t => t.completed);
        let points = tasks.filter(t => t.completed).reduce((sum, t) => sum + Math.max(1, Math.floor(t.duration / 10)), 0);
        if (allCompleted) points += 20;

        // streak logic
        const prevDate = DateUtil.format(DateUtil.addDays(DateUtil.parse(date), -1));
        const prevCheckIn = this.data.checkIns[prevDate];
        let newStreak = 1;
        if (prevCheckIn && prevCheckIn.checkedIn) {
          newStreak = (this.data.streak.current || 0) + 1;
        }
        this.data.streak.current = newStreak;
        if (newStreak > this.data.streak.longest) {
          this.data.streak.longest = newStreak;
        }

        // streak bonus
        if (newStreak >= 7) points += 100;
        else if (newStreak >= 3) points += 30;

        this.data.checkIns[date] = { checkedIn: true, pointsEarned: points, allCompleted, streakAtCheckIn: newStreak };
        this.data.totalPoints += points;
        this.save();
        return { points, allCompleted, streak: newStreak };
      },

      detectMissedDays() {
        const today = DateUtil.today();
        const missed = [];
        for (let d = new Date(DateUtil.parse(CONFIG.startDate)); DateUtil.format(d) < today; d = DateUtil.addDays(d, 1)) {
          const ds = DateUtil.format(d);
          const tasks = this.getTasksByDate(ds);
          if (tasks.length > 0) {
            const checkIn = this.data.checkIns[ds];
            if (!checkIn || !checkIn.checkedIn) {
              missed.push(ds);
            }
          }
        }
        return missed;
      },

      ensureScheduleIntegrity() {
        // Check if tasks cover full date range
        const existingDates = new Set(this.data.tasks.map(t => t.date));
        const allDates = [];
        for (let d = new Date(DateUtil.parse(CONFIG.startDate)); d <= DateUtil.parse(CONFIG.examDate); d = DateUtil.addDays(d, 1)) {
          allDates.push(DateUtil.format(d));
        }
        const missingDates = allDates.filter(date => !existingDates.has(date));
        if (missingDates.length > 0) {
          const fresh = PlanGenerator.generate();
          const freshByDate = {};
          fresh.forEach(t => { freshByDate[t.date] = freshByDate[t.date] || []; freshByDate[t.date].push(t); });
          missingDates.forEach(date => {
            this.data.tasks.push(...(freshByDate[date] || []));
          });
          this.save();
        }
      }
    };

    // ===================== Rescheduler =====================
    const Rescheduler = {
      reschedule(fromDate) {
        const missedDays = State.detectMissedDays();
        if (missedDays.length === 0) {
          return { rescheduled: false, reason: 'no_missed_days', backlogTotal: 0, backlogAssigned: 0, warning: false };
        }

        // Collect backlog tasks from missed days (only incomplete ones)
        const backlog = [];
        missedDays.forEach(date => {
          State.getTasksByDate(date).forEach(t => {
            if (!t.completed) {
              backlog.push({ ...t });
            }
          });
        });

        if (backlog.length === 0) {
          return { rescheduled: false, reason: 'no_backlog', backlogTotal: 0, backlogAssigned: 0, warning: false };
        }

        // Sort backlog by priority: listening > reading > writing > speaking > vocabulary > mock > review
        const priority = ['listening', 'reading', 'writing', 'speaking', 'vocabulary', 'mock', 'review'];
        backlog.sort((a, b) => {
          const pa = priority.indexOf(a.subject);
          const pb = priority.indexOf(b.subject);
          if (pa !== pb) return pa - pb;
          return a.date.localeCompare(b.date);
        });

        // Try to fit backlog tasks into remaining capacity of each future day
        let backlogIndex = 0;
        const exam = DateUtil.parse(CONFIG.examDate);
        for (let d = DateUtil.parse(fromDate); d < exam; d = DateUtil.addDays(d, 1)) {
          const ds = DateUtil.format(d);
          const isWeekend = d.getDay() === 0 || d.getDay() === 6;
          let capacity = isWeekend ? CONFIG.weekendMinutes : CONFIG.dailyMinutes;
          // Reduce capacity in final 3 days
          if (DateUtil.daysBetween(ds, CONFIG.examDate) <= 3) capacity = Math.min(capacity, 120);

          const existingTasks = State.data.tasks.filter(t => t.date === ds);
          const usedMinutes = existingTasks.reduce((sum, t) => sum + (t.duration || 30), 0);
          let remaining = Math.max(0, capacity - usedMinutes);

          while (remaining > 0 && backlogIndex < backlog.length) {
            const task = backlog[backlogIndex];
            const dur = task.duration || 30;
            if (dur <= remaining) {
              State.data.tasks.push({
                ...task,
                date: ds,
                title: task.title + '（补）',
                id: `${ds}-makeup-${task.subject}-${Date.now()}-${backlogIndex}`
              });
              remaining -= dur;
              backlogIndex++;
            } else {
              State.data.tasks.push({
                ...task,
                duration: remaining,
                date: ds,
                title: task.title + '（补·续）',
                id: `${ds}-makeup-${task.subject}-${Date.now()}-${backlogIndex}`
              });
              task.duration -= remaining;
              remaining = 0;
            }
          }
        }

        State.save();

        return {
          rescheduled: true,
          backlogTotal: backlog.length,
          backlogAssigned: backlogIndex,
          warning: backlogIndex < backlog.length
        };
      }
    };

          currentWeek.push(DateUtil.format(d));
          if (currentWeek.length === 7) {

        let html = `

              <ul class="text-sm text-gray-600 space-y-2">
                <li><strong>阶段一（7/10-7/13）</strong>：网课密集。何琼听力、刘洪波阅读、Simon+顾家北写作。</li>
                <li><strong>阶段二（7/14-8/24）</strong>：每天1套听力+1套阅读+1篇作文+口语+语料库。</li>
                <li><strong>阶段三（8/25-8/27）</strong>：模考+错题复盘+调整状态。</li>
                <li><strong>8/28</strong>：考试日。</li>
              </ul>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <h3 class="font-bold text-indigo-700 mb-2">📺 推荐课程/资料</h3>
              <div class="grid grid-cols-1 gap-3 text-sm">
                <div class="p-3 bg-purple-50 rounded-lg"><strong>听力</strong>：何琼听力技巧课（B站）+ 王陆语料库</div>
                <div class="p-3 bg-pink-50 rounded-lg"><strong>阅读</strong>：刘洪波平行阅读法 + 538考点词</div>
                <div class="p-3 bg-blue-50 rounded-lg"><strong>写作</strong>：Simon（结构）+ 顾家北（词伙/论证）+ 杜仕明（逻辑）</div>
                <div class="p-3 bg-green-50 rounded-lg"><strong>口语</strong>：当季题库 + 个人素材库 + 录音练习（不建议死记硬背）</div>
              </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <h3 class="font-bold text-indigo-700 mb-2">⚠️ 注意事项</h3>
              <ul class="text-sm text-gray-600 space-y-1">
                <li>每天约8小时学习强度极高，必须保证睡眠和营养</li>
                <li>每两天一次2小时健身，健身日任务适当减量</li>
                <li>口语用个人素材串题，避免背诵痕迹被考官识别</li>
                <li>考前3天不做新题，只看错题和模板</li>
              </ul>
            </div>
          </div>
        `;
      },

      dayDetail(date) {
        const tasks = State.getTasksByDate(date);
        const checkIn = State.getCheckIn(date);
        const isToday = date === DateUtil.today();

        let html = `
          <div class="mb-4">
            <button onclick="app.navigate('calendar')" class="text-sm text-indigo-600 font-medium mb-2">← 返回日历</button>
            <h2 class="text-xl font-bold text-gray-900">${date} 任务详情</h2>
          </div>
        `;

        if (tasks.length === 0) {
          html += `<div class="bg-white rounded-2xl p-6 text-center text-gray-500">当天没有安排学习任务。</div>`;
        } else {
          html += `<div class="space-y-3">`;
          tasks.forEach(task => {
            const subject = CONFIG.subjects[task.subject] || { name: task.subject, color: 'bg-gray-200', icon: '📌' };
            html += `
              <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-xs font-bold px-2 py-0.5 rounded text-white ${subject.color}">${subject.name}</span>
                  <span class="text-xs text-gray-500">${task.completed ? '✅ 已完成' : '⬜ 未完成'}</span>
                </div>
                <h3 class="font-semibold text-gray-900">${subject.icon} ${task.title}</h3>
                ${task.description ? `<p class="text-sm text-gray-600 mt-1">${task.description}</p>` : ''}
              </div>
            `;
          });
          html += `</div>`;

          if (checkIn.checkedIn) {
            html += `<div class="mt-4 p-4 bg-green-50 rounded-xl text-green-800 text-sm">已打卡，获得 ${checkIn.pointsEarned} 积分。</div>`;
          } else if (isToday) {
            html += `<div class="mt-4 text-center"><button onclick="app.navigate('today')" class="bg-indigo-600 text-white py-2 px-6 rounded-full text-sm font-bold">去打卡</button></div>`;
          }
        }

        return html;
      }
    };

    // ===================== App Controller =====================
    const app = {
      currentView: 'today',
      currentDetailDate: null,

      init() {
        State.init();
        this.checkMissedDays();
        this.navigate('today');
        this.updateHeader();
      },

      navigate(view, data = null) {
        this.currentView = view;
        if (data) this.currentDetailDate = data;

        // Update nav
        document.querySelectorAll('nav button').forEach(btn => {
          btn.className = 'flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent';
        });
        const activeBtn = document.getElementById(`nav-${view === 'dayDetail' ? 'calendar' : view}`);
        if (activeBtn) activeBtn.className = 'flex-1 py-3 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600';

        // Render view
        const main = document.getElementById('main-content');
        if (view === 'today') main.innerHTML = Views.today();
        else if (view === 'calendar') main.innerHTML = Views.calendar();
        else if (view === 'dashboard') main.innerHTML = Views.dashboard();
        else if (view === 'plan') main.innerHTML = Views.plan();
        else if (view === 'dayDetail') main.innerHTML = Views.dayDetail(this.currentDetailDate);

        window.scrollTo(0, 0);
      },

      updateHeader() {
        const today = DateUtil.today();
        const daysLeft = Math.max(0, DateUtil.daysBetween(today, CONFIG.examDate));
        document.getElementById('days-left').textContent = daysLeft;
        document.getElementById('total-points').textContent = State.data.totalPoints;
      },

      toggleTask(id) {
        State.toggleTask(id);
        this.updateHeader();
        if (this.currentView === 'today') this.navigate('today');
        else if (this.currentView === 'dayDetail') this.navigate('dayDetail', this.currentDetailDate);
      },

      checkIn() {
        const today = DateUtil.today();
        const result = State.checkIn(today);
        if (result) {
          this.updateHeader();
          this.navigate('today');
          this.confetti();
          setTimeout(() => alert(`🎉 打卡成功！获得 ${result.points} 积分，连续 ${result.streak} 天！`), 100);
        }
      },

      showDayDetail(date) {
        this.navigate('dayDetail', date);
      },

      checkMissedDays() {
        const missed = State.detectMissedDays();
        if (missed.length > 0) {
          setTimeout(() => {
            if (confirm(`检测到 ${missed.length} 天未打卡（${missed.join(', ')}）。是否重新安排后续计划？`)) {
              this.reschedule();
            }
          }, 500);
        }
      },

      reschedule() {
        const today = DateUtil.today();
        const tomorrow = DateUtil.format(DateUtil.addDays(DateUtil.parse(today), 1));
        const result = Rescheduler.reschedule(tomorrow);
        if (result.warning) {
          alert(`⚠️ 已重新安排，但仍有 ${result.remaining} 个任务无法在考前完成。建议增加每日学习时长或精简任务。`);
        } else {
          alert(`✅ 已重新安排后续计划，共调整 ${result.tasksMoved} 个任务。`);
        }
        this.updateHeader();
        this.navigate('today');
      },

      resetData() {
        if (confirm('确定要重置所有数据吗？打卡记录和积分将全部清空。')) {
          State.reset();
          this.updateHeader();
          this.navigate('today');
        }
      },

      forceRefresh() {
        if (confirm('强制刷新会清除本地缓存并重新加载最新版本，确定继续？')) {
          // Unregister service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              registrations.forEach(reg => reg.unregister());
            });
          }
          // Clear localStorage
          localStorage.clear();
          // Reload from server with cache busting
          window.location.href = window.location.href.split('?')[0] + '?_=' + Date.now();
        }
      },

      confetti() {
        const colors = ['#667eea', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#ff0844'];
        for (let i = 0; i < 30; i++) {
          const el = document.createElement('div');
          el.className = 'confetti';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.background = colors[Math.floor(Math.random() * colors.length)];
          el.style.animationDuration = (Math.random() * 2 + 2) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 4000);
        }
      }
    };

    // Register service worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW registration failed:', err));
    }

    // Start the app
    document.addEventListener('DOMContentLoaded', () => app.init());
  </script>
</body>
</html>
